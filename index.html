<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CDN Resource Logger</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #log-container { 
            background: #f4f4f4; 
            padding: 15px; 
            border-radius: 5px; 
            border: 1px solid #ddd;
            word-break: break-all;
            max-height: 500px;
            overflow-y: auto;
        }
        .url-entry { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .tag { font-size: 12px; background: #007bff; color: white; padding: 2px 6px; border-radius: 3px; margin-right: 5px; }
    </style>
</head>
<body>

    <h2>CDN 路徑監控工具</h2>
    <p>說明：本頁面會自動監測所有載入的資源路徑（包含圖片與 Google User Content）。</p>
    
    <div id="log-container">
        <div id="status">正在等待資源載入...</div>
    </div>

    <script>
        const logContainer = document.getElementById('log-container');
        const status = document.getElementById('status');

        function appendLog(name, type) {
            if (status) status.remove(); // 移除初始文字
            
            const div = document.createElement('div');
            div.className = 'url-entry';
            div.innerHTML = `<span class="tag">${type}</span>${name}`;
            logContainer.prepend(div); // 新的排在上面
        }

        // 1. 抓取「已經載入」的資源
        const existingResources = window.performance.getEntriesByType("resource");
        existingResources.forEach(res => {
            if (res.name.includes('googleusercontent') || res.initiatorType === 'img') {
                appendLog(res.name, res.initiatorType);
            }
        });

        // 2. 監聽「未來載入」的資源 (處理動態載入)
        const observer = new PerformanceObserver((list) => {
            list.getEntries().forEach((entry) => {
                if (entry.name.includes('googleusercontent') || entry.initiatorType === 'img') {
                    appendLog(entry.name, entry.initiatorType);
                }
            });
        });

        // 開始監控資源載入
        observer.observe({ entryTypes: ['resource'] });
    </script>

</body>
</html>
