<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Google Photos ID Scraper</title>
    <style>
        body { font-family: monospace; background: #121212; color: #00ff00; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        #log-container { 
            background: #000; border: 1px solid #333; padding: 15px; 
            border-radius: 4px; overflow-y: auto; height: 80vh;
        }
        .id-entry { margin-bottom: 4px; color: #00ff00; border-bottom: 1px solid #1a1a1a; padding: 2px 0; }
        .count-header { font-size: 1.2em; margin-bottom: 10px; color: #fff; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 5px 15px; cursor: pointer; margin-bottom: 10px; }
        button:hover { background: #444; }
    </style>
</head>
<body>

<div class="container">
    <div class="count-header">已偵測到的資源 ID (<span id="counter">0</span>)</div>
    <button onclick="copyAll()">全部複製</button>
    <div id="log-container"></div>
</div>

<script>
    const logContainer = document.getElementById('log-container');
    const counterDisplay = document.getElementById('counter');
    const seenIds = new Set();

    function extractIdAndLog(url) {
        // 1. 嘗試從 URL 中提取最後一段路徑 (即截圖中的 Name)
        // 通常 Google Photos 的路徑結構最後一段就是 ID
        try {
            const parts = url.split('/');
            const namePart = parts[parts.length - 1].split('?')[0]; // 移除參數

            // 2. 檢查是否符合截圖中的特徵 (長度長、包含特定前綴)
            // 你截圖中的字串通常長度大於 20，且為英數混雜
            if (namePart.length > 20 && !seenIds.has(namePart)) {
                seenIds.add(namePart);
                renderId(namePart);
            }
        } catch (e) {
            console.error("解析失敗:", url);
        }
    }

    function renderId(id) {
        const div = document.createElement('div');
        div.className = 'id-entry';
        div.textContent = id;
        logContainer.prepend(div);
        counterDisplay.textContent = seenIds.size;
    }

    function copyAll() {
        const allIds = Array.from(seenIds).join('\n');
        navigator.clipboard.writeText(allIds).then(() => alert('已複製所有 ID 到剪貼簿'));
    }

    // 自動監控已存在的資源
    performance.getEntriesByType("resource").forEach(res => {
        if (res.name.includes('googleusercontent.com')) {
            extractIdAndLog(res.name);
        }
    });

    // 動態監控新出現的資源 (滾動頁面時)
    const observer = new PerformanceObserver((list) => {
        list.getEntries().forEach((entry) => {
            if (entry.name.includes('googleusercontent.com')) {
                extractIdAndLog(entry.name);
            }
        });
    });
    observer.observe({ entryTypes: ['resource'] });
</script>

</body>
</html>
