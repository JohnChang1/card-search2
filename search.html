<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微笑小舖 - 卡片管理系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>卡片查詢系統</h2>
        <button class="btn-settings" onclick="toggleModal(true)">⚙ 系統設定</button>
    </div>

    <div class="toolbar">
        <input type="text" id="keyword" placeholder="輸入編號 (例如: loch-jp001)">
        <select id="rareSelect" onchange="checkGlobalBtn()">
            <option value="0">全部稀有度</option>
        </select>
        <input type="number" id="defaultQty" placeholder="數量" value="1" style="width: 70px;">
        <input type="number" id="defaultPrice" placeholder="自訂價" style="width: 100px;">
        <button class="btn-search" id="searchBtn" onclick="fetchData()">查詢</button>
        <button id="globalWriteBtn" class="btn-copy" style="background:#ffc107; color:#000; flex:0.5;" onclick="writeCurrentToExcel()" disabled>✍️ 快速加入</button>
    </div>
    <table id="resultTable">
        <thead>
            <tr>
                <th width="100">圖片</th>
                <th>卡片標題 / 上架名稱</th> 
                <th width="100">稀有度</th>
                <th width="120">市場價格</th>
                <th width="150">數量 / 自訂價</th> 
                <th width="100">操作</th>
            </tr>
        </thead>
        <tbody id="cardTableBody">
            <tr><td colspan="6" class="empty-state">請輸入編號並點擊查詢</td></tr>
        </tbody>
    </table>    
    <div id="previewContainer" style="margin: 20px 0; padding: 15px; background: #f8f9fa; border: 2px solid #28a745; border-radius: 8px; display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <strong style="color: #28a745;">📋 待匯出預覽 (<span id="pendingCount">0</span> 筆)</strong>
            <div>
                <button class="btn-cancel" onclick="clearPending()" style="margin-right:10px;">清空清單</button>
                <button class="btn-search" style="background:#28a745;" onclick="exportToNewExcel()">💾 下載新 Excel</button>
            </div>
        </div>
        <table style="width: 100%; font-size: 13px; background: white;">
            <thead>
                <tr style="background: #eee;">
                    <th width="50">序號</th>
                    <th>商品名稱</th>
                    <th width="80">價格</th>
                    <th width="60">數量</th>
                    <th>圖片路徑預覽 (CDN/API)</th>
                    <th width="50">操作</th>
                </tr>
            </thead>
            <tbody id="previewTableBody">
                </tbody>
        </table>
    </div>


</div>

<div class="container">
    <h2>地端圖庫 (點擊生成 GitHub CDN 路徑)</h2>
    <div class="toolbar">
        <input type="text" id="folderName" placeholder="GitHub 資料夾名稱 (例如: images)">
        <input type="file" id="filePicker" webkitdirectory directory multiple style="display:none;" onchange="handleFiles(this.files)">
        <button class="btn-settings" onclick="document.getElementById('filePicker').click()">選擇地端資料夾</button>
    </div>

    <div id="localGallery" class="album-grid">
        <p style="color: #999; padding: 20px;">請先選擇地端資料夾以載入圖片...</p>
    </div>

    <div id="cdnPanel" class="path-panel" style="display: none; background: #e9f7ef; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #28a745;">
        <strong>已組合成 GitHub CDN 路徑：</strong>
        <div id="cdnUrlDisplay" class="url-text" style="word-break: break-all; margin: 10px 0; color: #007bff; font-family: monospace;"></div>
        <button class="btn-copy" onclick="copyText(document.getElementById('cdnUrlDisplay').innerText, this)" style="background: #28a745;">複製路徑</button>
    </div>
</div>

<div id="settingsModal" style="display: none; position: fixed; z-index: 10001; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);">
    <div class="modal-content" style="background: white; width: 500px; margin: 100px auto; padding: 20px; border-radius: 12px;">
        <h3>⚙️ 系統設定</h3>
        <div style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom: 5px;">商店名稱前綴：</label>
            <input type="text" id="shopNameInput" placeholder="例如：[微笑小舖]" style="width: 100%; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display:block; margin-bottom: 5px;">稀有度列表 (JSON 格式)：</label>
            <textarea id="rareJsonInput" style="width: 100%; height: 200px; font-family: monospace; box-sizing: border-box;"></textarea>
        </div>
        
        <div class="modal-footer" style="text-align: right; margin-top: 20px;">
            <button class="btn-cancel" onclick="toggleModal(false)">取消</button>
            <button class="btn-search" onclick="saveSettings()" style="background: #007bff; margin-left: 10px;">儲存並套用</button>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
